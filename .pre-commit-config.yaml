# Pre-commit hook configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # Trailing whitespace and end-of-file-fixer
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Identify files that would conflict in merge
      - id: check-merge-conflict
      # Check for files that would conflict in merge (advanced)
      - id: check-added-large-files
        args: ['--maxkb=1000']
      # Trim trailing whitespace
      - id: trailing-whitespace
      # Fix end of file newline
      - id: end-of-file-fixer
      # JSON validation
      - id: check-json
      # YAML validation (basic)
      - id: check-yaml
      # YAML with unsafe loader
      - id: check-yaml
        args: ['--unsafe']
      # Check for merge conflicts
      - id: check-ast
      # TOML format check
      - id: check-toml
      # Check for secret-like strings (simple patterns)
      - id: detect-private-key

  # Shell script linting with shellcheck
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.2
    hooks:
      - id: shellcheck
        args: ['--severity=warning']
